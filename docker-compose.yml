version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL (Relational Database)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
      POSTGRES_DB: travel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db-init:/docker-entrypoint-initdb.d
    networks:
      - travel-network

  # ----------------------------------------
  # Redis (Cache / Rate Limiting)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - travel-network

  # ----------------------------------------
  # Qdrant (Vector Database)
  # ----------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: travel-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - travel-network

  # ----------------------------------------
  # Zookeeper (for Kafka)
  # ----------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: travel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - travel-network

  # ----------------------------------------
  # Apache Kafka (Message Broker)
  # ----------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: travel-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - travel-network

  # ----------------------------------------
  # Kafka UI (for visibility during dev)
  # ----------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: travel-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - travel-network

  # ----------------------------------------
  # Kafka Setup (Initializes Topics)
  # ----------------------------------------
  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: travel-kafka-setup
    depends_on:
      - kafka
    volumes:
      - ./infrastructure/kafka-init/init-topics.sh:/init-topics.sh
    command: "bash /init-topics.sh"
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
