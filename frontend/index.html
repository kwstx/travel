<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soar - Somewhere is missing you.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <svg class="plane-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
         <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Soar
    </div>
    <button class="sign-in">Sign in &rarr;</button>
  </header>

  <main class="main-content">
    <h1 class="headline">Somewhere is missin<span class="lower-gradient">g</span> <span class="lower-gradient">y</span>ou.</h1>
    
    <div class="search-bar">
      <div class="field">
        <span class="label">FROM</span>
        <input type="text" class="input-text" value="Thessaloni... (SKG)">
      </div>
      
      <div class="field">
        <span class="label">TO</span>
        <input type="text" class="input-text placeholder" placeholder="City or airport">
      </div>
      
      <div class="field">
        <span class="label">DATES</span>
        <div class="dates-input">
          <span class="date-val">Δευ 6 Ιουλ</span>
          <span class="date-arrow">&rarr;</span>
          <span class="date-placeholder">Add return</span>
        </div>
      </div>
      
      <div class="field">
        <span class="label">CLASS</span>
        <select class="input-select">
          <option>Economy</option>
        </select>
      </div>
      
      <button class="search-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        Search
      </button>
    </div>
    
    <button class="add-friends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Bring Friends
    </button>
  </main>

  <footer class="footer">
    <a href="#" class="privacy">Privacy Policy</a>
    <svg class="x-logo" viewBox="0 0 24 24" fill="currentColor">
       <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
  </footer>
</body>
</html>
