apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: api-gateway-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: api-gateway
  minReplicaCount: 2
  maxReplicaCount: 10
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.default.svc.cluster.local:9090
        metricName: http_requests_total
        threshold: '100'
        query: sum(rate(http_requests_total{app="api-gateway"}[2m]))
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: auth-service-scaler
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: auth-service
  minReplicaCount: 2
  maxReplicaCount: 5
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: cpu
      metadata:
        type: Utilization
        value: "70"
